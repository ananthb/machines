builds:
  include:
    - "*.x86_64-linux.*"
    - "*.aarch64-linux.*"
    - "*.aarch64-darwin.*"
    - "nixosConfigurations.*"
    - "darwinConfigurations.*"
  exclude:
    # eval OOMs on garnix's 8 GiB cap (GNOME + NixVirt + home-manager surface);
    # deploy-rs --remote-build builds on the target host instead.
    - "nixosConfigurations.enterprise"

servers:
  - configuration: kedi-cloud-garnix1
    deployment:
      type: on-branch
      branch: main
