name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tailscale-acl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ./version-cache.json
          key: version-cache.json-${{ github.run_id }}
          restore-keys: version-cache.json-

      - name: Test ACL
        if: github.event_name == 'pull_request'
        uses: tailscale/gitops-acl-action@4105afd651aa659e0eec9031a10360c39fbc0804 # v1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: test

      - name: Apply ACL
        if: github.event_name == 'push'
        uses: tailscale/gitops-acl-action@4105afd651aa659e0eec9031a10360c39fbc0804 # v1
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tailnet: ${{ secrets.TS_TAILNET }}
          action: apply

  wait-for-garnix:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Wait for Garnix CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          echo "Waiting for Garnix CI to complete on $sha..."
          for i in $(seq 1 60); do
            checks=$(gh api "repos/${{ github.repository }}/commits/$sha/check-runs" \
              --jq '.check_runs[] | select(.app.slug == "garnix-ci") | {name, status, conclusion}')
            if [ -z "$checks" ]; then
              echo "No Garnix checks yet, waiting... ($i/60)"
              sleep 30
              continue
            fi
            in_progress=$(echo "$checks" | jq -r 'select(.status != "completed")' 2>/dev/null)
            if [ -n "$in_progress" ]; then
              echo "Garnix CI still running, waiting... ($i/60)"
              sleep 30
              continue
            fi
            # All completed — check for deploy-critical failures (ignore darwinConfig and enterprise)
            failed=$(echo "$checks" | jq -r 'select(.conclusion == "failure") | .name' 2>/dev/null)
            if [ -n "$failed" ]; then
              echo "Garnix CI completed with failures:"
              echo "$failed" | sed 's/^/  /'
              echo "Continuing — deploy-rs will use cached successful builds."
            fi
            echo "Garnix CI completed!"
            exit 0
          done
          echo "Timed out waiting for Garnix CI"
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [tailscale-acl, wait-for-garnix]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:deploy

      - name: Add SSH host keys
        run: |
          mkdir -p ~/.ssh
          echo "endeavour ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAJxgao1yX2VxxPIozAKlL3cbk2SpBPfxjF29q7S/oFf" >> ~/.ssh/known_hosts
          echo "enterprise ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIFQt03m35by3UEWbU2KiEsr+9jnxXoFwRNflQYKCjE6n" >> ~/.ssh/known_hosts
          echo "stargazer ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIK1jqNdM9sPcuX9qkMPvlTMnkzyUQY1CnMGYHv2Epogo" >> ~/.ssh/known_hosts

      - name: Deploy
        run: nix run github:serokell/deploy-rs -- --skip-checks --remote-build
