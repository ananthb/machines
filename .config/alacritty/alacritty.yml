# vim: set filetype=yaml:

imports:
  - ~/.config/alacritty/extra.yml

window:
  dimensions:
    columns: 80
    lines: 24

  dynamic_title: true

font:
  normal:
    family: Hack Nerd Font
    style: Regular

  bold:
    family: Hack Nerd Font
    style: Bold

  italic:
    family: Hack Nerd Font
    style: Italic

  bold_italic:
    family: Hack Nerd Font
    style: Bold Italic

  size: 14.0

selection:
  save_to_clipboard: true

live_config_reload: true

shell:
  program: /usr/bin/fish
  args:
    - -l
    - -i
    - -c 
    - "/usr/bin/tmux attach -t main || /usr/bin/tmux new-session -t main"
